services:

  postgres:
    image: postgres:15
    container_name: lakehouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_iceberg_catalog.sql:/docker-entrypoint-initdb.d/init_iceberg_catalog.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg_catalog"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - lakehouse

  # Одноразовый сервис: создаёт бакет "warehouse" при первом старте
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/warehouse || true) &&
      mc anonymous set download local/warehouse &&
      echo 'MinIO bucket warehouse готов'
      "
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:latest
    container_name: lakehouse-trino
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - lakehouse

networks:
  lakehouse:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
